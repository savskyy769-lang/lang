<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALE Graphic Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1 class="logo">SALE Graphic Cards</h1>
            <button class="cart-btn" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="filterProducts('all')">Все</button>
            <button class="filter-btn" data-filter="gpu" onclick="filterProducts('gpu')">Видеокарты</button>
            <button class="filter-btn" data-filter="cpu" onclick="filterProducts('cpu')">Процессоры</button>
            <button class="filter-btn" data-filter="motherboard" onclick="filterProducts('motherboard')">Материнские платы</button>
            <button class="filter-btn" data-filter="ram" onclick="filterProducts('ram')">ОЗУ</button>
            <button class="filter-btn" data-filter="storage" onclick="filterProducts('storage')">Накопители</button>
            <button class="filter-btn" data-filter="psu" onclick="filterProducts('psu')">Блоки питания</button>
            <button class="filter-btn" data-filter="case" onclick="filterProducts('case')">Корпуса</button>
            <button class="filter-btn" data-filter="cooler" onclick="filterProducts('cooler')">Охлаждение</button>
        </div>

        <div class="products-grid" id="products-grid"></div>
    </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Корзина</h2>
            <button class="close-btn" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <p class="cart-empty">Корзина пуста</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Итого:</span>
                <span id="cart-total-price">0 ₽</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
